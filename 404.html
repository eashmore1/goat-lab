<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>404 — GOAT Lab</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .error-wrap {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }
      .error-box {
        max-width: 460px;
        width: 100%;
        padding: 32px;
        border: 4px solid var(--ink);
        background: var(--chalk);
        box-shadow: 8px 8px 0 var(--ink);
        text-align: center;
      }
      .error-num {
        margin: 0 0 6px;
        font: 950 5.5rem/1 "Space Mono", ui-monospace, monospace;
        color: var(--court);
        letter-spacing: -0.04em;
      }
      .error-box h1 {
        margin: 0 0 10px;
        font-size: clamp(1.4rem, 4vw, 2rem);
        font-weight: 900;
        line-height: 1;
      }
      .error-box p {
        margin: 0 0 24px;
        color: var(--muted);
        font: 400 0.84rem/1.55 "Space Mono", ui-monospace, monospace;
      }
      .error-cta {
        display: inline-block;
        padding: 12px 24px;
        border: 3px solid var(--ink);
        background: var(--court);
        color: var(--chalk);
        box-shadow: 5px 5px 0 var(--ink);
        font: 900 0.84rem/1 "Space Mono", ui-monospace, monospace;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      .error-cta:hover {
        transform: translate(2px, 2px);
        box-shadow: 3px 3px 0 var(--ink);
      }
      .error-cta:focus-visible {
        outline: 2px solid var(--gold);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <a href="/"><img src="GOATLABLOGO.png" alt="GOAT Lab" class="hero-logo" /></a>
      </header>
      <div class="error-wrap">
        <div class="error-box">
          <p class="error-num">404</p>
          <h1>Page not found.</h1>
          <p>That page doesn't exist — but the perfect player might. Head back and build your GOAT.</p>
          <a href="/" class="error-cta">Build Your GOAT</a>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <div class="footer-inner">
        <span>© 2026 Momentum Apps LLC. All rights reserved.</span>
        <div class="footer-links">
          <a href="mailto:ethan@momentumapps.net">Contact</a>
          <span class="footer-dot">·</span>
          <a href="terms.html">Terms</a>
          <span class="footer-dot">·</span>
          <a href="privacy.html">Privacy</a>
        </div>
      </div>
    </footer>
  </body>
</html>
